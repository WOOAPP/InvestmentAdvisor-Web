name: Build and Upload Release Asset
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: InvestmentAdvisor.exe
            asset_name: InvestmentAdvisor-windows-x86_64.exe
            separator: ";"
          - os: ubuntu-latest
            artifact_name: InvestmentAdvisor
            asset_name: InvestmentAdvisor-linux-x86_64
            separator: ":"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller anthropic openai yfinance requests beautifulsoup4 matplotlib pandas schedule fpdf2

      - name: Build executable
        run: >
          pyinstaller --onefile --name InvestmentAdvisor
          --add-data "modules${{ matrix.separator }}modules"
          --hidden-import=anthropic --hidden-import=openai
          --hidden-import=yfinance --hidden-import=bs4
          --hidden-import=matplotlib --hidden-import=pandas
          --hidden-import=schedule --hidden-import=fpdf
          --hidden-import=sqlite3 --hidden-import=tkinter
          --collect-submodules yfinance --collect-submodules matplotlib
          main.py

      - name: Get latest tag
        id: tag
        shell: bash
        run: echo "TAG=$(git tag --sort=-v:refname | head -1)" >> $GITHUB_OUTPUT

      - name: Rename artifact
        shell: bash
        run: mv "dist/${{ matrix.artifact_name }}" "dist/${{ matrix.asset_name }}"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          files: dist/${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
